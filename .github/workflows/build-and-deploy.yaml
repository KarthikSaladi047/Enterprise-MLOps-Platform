name: Build, Push, and Update Manifests

on:
  push:
    branches:
      - main
    paths:
      - '4-user-interface/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mlops-ui

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Tag and Lowercase Repo Name
        id: vars
        run: |
          # 1. Get the short SHA
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          
          # 2. Force the GitHub repository string to lowercase
          LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lower_repo=$LOWER_REPO" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: 4-user-interface
          file: 4-user-interface/Dockerfile
          push: true
            tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.lower_repo }}/mlops-ui:${{ steps.vars.outputs.sha_short }}

      - name: Update Kubernetes Manifests
        run: |
          cd 1-infrastructure/ui-manifests
          
          # Construct the exact image name we just pushed
          NEW_IMAGE="${{ env.REGISTRY }}/${{ steps.vars.outputs.lower_repo }}/mlops-ui:${{ steps.vars.outputs.sha_short }}"
          
          # Replace it in the YAML
          sed -i "s|image: ghcr.io/.*|image: ${NEW_IMAGE}|g" ui.yaml
          sed -i "s|image: ghcr.io/.*|image: ${NEW_IMAGE}|g" api.yaml
          
          echo "Updated ui.yaml and api.yaml to use image: $NEW_IMAGE"

      - name: Commit and Push Changes to ArgoCD Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add 1-infrastructure/ui-manifests/ui.yaml 1-infrastructure/ui-manifests/api.yaml
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "GitOps: Update UI image to ${{ steps.vars.outputs.sha_short }}"
            git push origin main
          else
            echo "No changes to commit."
          fi