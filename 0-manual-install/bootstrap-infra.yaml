apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/KarthikSaladi047/Enterprise-MLOps-Platform.git'
    targetRevision: main
    path: 1-infrastructure/argo-applications
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true