apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/KarthikSaladi047/Enterprise-MLOps-Platform.git
    targetRevision: main
    path: 1-infrastructure/argo-workflows

  destination:
    server: https://kubernetes.default.svc
    namespace: kubeflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true