apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: katib
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/KarthikSaladi047/Enterprise-MLOps-Platform.git
    targetRevision: main
    path: 1-infrastructure/katib

  destination:
    server: https://kubernetes.default.svc
    namespace: katib

  ignoreDifferences:
  - group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
  - group: admissionregistration.k8s.io
    kind: ValidatingWebhookConfiguration

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true