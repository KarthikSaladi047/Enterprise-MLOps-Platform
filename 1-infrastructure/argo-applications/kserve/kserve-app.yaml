apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kserve
  namespace: argocd
spec:
  project: default

  source:
    repoURL: oci://ghcr.io/kserve/charts
    chart: kserve-resources
    targetRevision: v0.18.0
    helm:
      values: |
        kserve:
          controller:
            deploymentMode: Knative

  destination:
    server: https://kubernetes.default.svc
    namespace: kserve

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true