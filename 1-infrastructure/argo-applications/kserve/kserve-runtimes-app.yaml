apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kserve-runtime-configs
  namespace: argocd
spec:
  project: default

  source:
    repoURL: ghcr.io/kserve/charts
    chart: kserve-runtime-configs
    targetRevision: v0.18.0
    helm:
      values: |
        kserve:
          servingruntime:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kserve

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true