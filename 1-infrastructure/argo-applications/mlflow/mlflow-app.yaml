apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlflow
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/mlflow/mlflow.git
    targetRevision: v3.14.0
    path: charts
    helm:
      values: |
        mlflow:
          backendStoreUriFrom:
            secretKeyRef:
              name: postgres-secret
              key: mlflow-uri
          defaultArtifactRoot: "s3://mlflow-artifacts"

        env:
          - name: MLFLOW_SERVER_ALLOWED_HOSTS
            value: "*"
          - name: MLFLOW_SERVER_CORS_ALLOWED_ORIGINS
            value: "*"
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: minio-creds
                key: rootUser
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-creds
                key: rootPassword
          - name: AWS_ENDPOINT_URL
            value: http://minio.minio.svc.cluster.local:9000

        service:
          type: NodePort

        nodeSelector:
          node-role.kubernetes.io/infra: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: mlflow

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true