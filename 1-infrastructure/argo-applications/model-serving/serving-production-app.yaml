apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml-serving-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/KarthikSaladi047/Enterprise-MLOps-Platform.git'
    targetRevision: main
    path: 3-model-serving/env-production # 🚨 Watches ONLY the Production folder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: production # Deploys models to the production namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true