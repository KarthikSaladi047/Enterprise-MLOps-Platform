apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "apps"
            effect: "NoSchedule"
      containers:
      - name: fastapi
        image: ghcr.io/karthiksaladi047/enterprise-mlops-platform/mlops-ui:e8c9297
        command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
