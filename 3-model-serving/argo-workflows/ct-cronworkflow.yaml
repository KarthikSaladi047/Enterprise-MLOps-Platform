apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: continuous-training-job
  namespace: kubeflow
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Replace
  startingDeadlineSeconds: 0

  workflowSpec:
    entrypoint: trigger-ct
    serviceAccountName: pipeline-runner

    templates:
    - name: trigger-ct
      container:
        image: python:3.10
        command:
          - /bin/bash
          - -c

        env:
        - name: GIT_REPO_URL
          valueFrom:
            secretKeyRef:
              name: infra-credentials
              key: GIT_REPO_URL

        - name: KUBEFLOW_HOST
          valueFrom:
            secretKeyRef:
              name: infra-credentials
              key: KUBEFLOW_HOST

        args:
        - |
          set -e
          export GIT_TERMINAL_PROMPT=0

          pip install --quiet --no-cache-dir kfp==2.* kfp-kubernetes

          echo "Cloning repository..."
          git clone --branch main "$GIT_REPO_URL" /tmp/repo
          cd /tmp/repo

          # Find the latest commit that modified anything under 2-ml-workspace/
          export PIPELINE_SHA=$(git log -1 --format=%h -- 2-ml-workspace/)

          if [ -z "$PIPELINE_SHA" ]; then
            echo "Unable to determine latest commit for 2-ml-workspace/"
            exit 1
          fi

          echo "Latest pipeline commit: $PIPELINE_SHA"

          cd 2-ml-workspace

          # Generate pipeline YAML
          python3 hf_pipeline.py

          cat <<'EOF' > submit.py
          import kfp
          import os
          import sys

          EXPERIMENT_NAME = "enterprise-text-classifier"
          MAX_ATTEMPTS = 3

          ACTIVE_STATES = {
              "PENDING",
              "RUNNING",
              "PAUSED",
              "CANCELING",
          }

          PIPELINE_SHA = os.environ["PIPELINE_SHA"]
          KUBEFLOW_HOST = os.environ["KUBEFLOW_HOST"]

          RUN_PREFIX = f"enterprise-text-classifier-{PIPELINE_SHA}"

          client = kfp.Client(host=KUBEFLOW_HOST)

          # Get or create experiment
          try:
              experiment = client.get_experiment(
                  experiment_name=EXPERIMENT_NAME,
                  namespace="kubeflow",
              )
          except ValueError:
              print(f"Experiment '{EXPERIMENT_NAME}' does not exist. Creating...")
              experiment = client.create_experiment(
                  EXPERIMENT_NAME,
                  namespace="kubeflow",
              )

          # Retrieve all runs
          runs = []
          page_token = ""

          while True:
              response = client.list_runs(
                  experiment_id=experiment.experiment_id,
                  page_size=100,
                  page_token=page_token,
              )

              runs.extend(response.runs or [])

              if not response.next_page_token:
                  break

              page_token = response.next_page_token

          matching = []

          for run in runs:
              name = run.display_name or ""

              if not name.startswith(f"{RUN_PREFIX}-attempt-"):
                  continue

              try:
                  attempt = int(name.rsplit("-", 1)[1])
              except ValueError:
                  continue

              state = (run.state or "").upper()

              matching.append(
                  {
                      "attempt": attempt,
                      "state": state,
                      "name": name,
                  }
              )

          if matching:
              print("\nExisting runs for this commit:")
              for r in sorted(matching, key=lambda x: x["attempt"]):
                  print(f"  Attempt {r['attempt']}: {r['state']} ({r['name']})")
          else:
              print("\nNo previous runs found for this commit.")

          # Already succeeded
          if any(r["state"] == "SUCCEEDED" for r in matching):
              print(f"\n✅ Commit {PIPELINE_SHA} already succeeded.")
              sys.exit(0)

          # Already running
          if any(r["state"] in ACTIVE_STATES for r in matching):
              print(f"\n⏳ Commit {PIPELINE_SHA} already has an active run.")
              sys.exit(0)

          highest_attempt = max(
              (r["attempt"] for r in matching),
              default=0,
          )

          if highest_attempt >= MAX_ATTEMPTS:
              print(
                  f"\n🛑 Commit {PIPELINE_SHA} has already reached "
                  f"{MAX_ATTEMPTS} attempts."
              )
              sys.exit(0)

          attempt = highest_attempt + 1

          run_name = f"{RUN_PREFIX}-attempt-{attempt}"

          print(f"\n🚀 Submitting {run_name}")

          client.create_run_from_pipeline_package(
              pipeline_file="hf_pipeline.yaml",
              run_name=run_name,
              experiment_name=EXPERIMENT_NAME,
              namespace="kubeflow",
          )

          print("✅ Submission complete.")
          EOF

          python3 submit.py