apiVersion: apps/v1
kind: Deployment
metadata:
  name: gradio-ui
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gradio-ui
  template:
    metadata:
      labels:
        app: gradio-ui
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "apps"
            effect: "NoSchedule"
      containers:
      - name: gradio
        image: ghcr.io/karthiksaladi047/enterprise-mlops-platform/mlops-ui:91c386c
        command: ["python3", "ui.py"]
        env:
        # Point the UI to the FastAPI internal Service DNS
        - name: API_URL
          value: "http://api-gateway:8000/predict"
        ports:
        - containerPort: 7860
---
apiVersion: v1
kind: Service
metadata:
  name: gradio-ui
  namespace: default
spec:
  type: NodePort
  selector:
    app: gradio-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 7860